name: "❓ 질문 / 자유 토론"
description: "책을 읽다 생긴 궁금증이나, 함께 이야기 나누고 싶은 주제를 올립니다."
title: "[질문/토론] "
labels: ["question", "discussion"]
body:
  - type: markdown
    attributes:
      value: |
        사소한 질문도 좋고, 정답이 없는 토론 주제도 환영합니다.
        길게 쓰지 않아도 됩니다. 책의 어느 부분 얘기인지만 분명히 적어주세요.

  - type: input
    id: scope
    attributes:
      label: "🔖 관련 범위"
      description: "어느 챕터, 어느 절(또는 페이지)인지 적어주세요."
      placeholder: "예: 2장 이상한 나라의 객체 - 객체, 그리고 이상한 나라"
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: "💬 질문 또는 토론 내용"
      placeholder: "무엇이 궁금한지, 어떤 주제로 이야기 나누고 싶은지 적어주세요."
    validations:
      required: true

  - type: textarea
    id: thoughts
    attributes:
      label: "💡 지금 내가 이해한 바 / 내 생각 (선택)"
      description: "현재 본인의 생각을 짧게라도 적어두면 토론이 훨씬 깊어집니다."
